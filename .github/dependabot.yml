version: 2
updates:
  # Python SDK
  - package-ecosystem: pip
    directory: "/python"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "python"]
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # TypeScript SDK
  - package-ecosystem: npm
    directory: "/typescript"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "typescript"]
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Java SDK
  - package-ecosystem: maven
    directory: "/java"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "java"]
    groups:
      maven-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # C# SDK
  - package-ecosystem: nuget
    directory: "/csharp"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "csharp"]
    groups:
      nuget-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Ruby SDK
  - package-ecosystem: bundler
    directory: "/ruby"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "ruby"]
    groups:
      bundler-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Rust SDK
  - package-ecosystem: cargo
    directory: "/rust"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "rust"]
    groups:
      cargo-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "ci"]
    groups:
      actions-all:
        patterns: ["*"]
