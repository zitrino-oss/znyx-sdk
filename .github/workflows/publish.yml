# Publish the Znyx SDKs to their registries.
#
# TEMPLATE - each job requires repository secrets before it will run. The first
# release of each language is intended to be done manually (to verify install);
# after that, publishing a GitHub Release triggers the matching job(s).
#
# Required secrets:
#   PYPI_API_TOKEN        Python -> PyPI (znyx-sdk)
#   NPM_TOKEN             TypeScript -> npm (@znyx/sdk) and npm-runtime (@znyx/runtime)
#   CARGO_REGISTRY_TOKEN  Rust -> crates.io (znyx-sdk)
#   NUGET_API_KEY         C# -> NuGet (Znyx.Sdk)
#   RUBYGEMS_API_KEY      Ruby -> RubyGems (znyx-sdk)
#   OSSRH_USERNAME / OSSRH_TOKEN   Java -> Maven Central (ai.znyx:znyx-sdk)
#
# Distribution names are FROZEN across the move to zitrino-oss; do not rename them.
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade build twine
      - run: python -m build python
      - run: twine check python/dist/*
      - env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload python/dist/*

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - working-directory: typescript
        run: npm ci && npm run build
      - working-directory: typescript
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: npm publish --access public

  npm-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - working-directory: npm-runtime
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: npm publish --access public

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - working-directory: rust
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - working-directory: csharp
        run: |
          dotnet pack -c Release -o out
          dotnet nuget push "out/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.2" }
      - working-directory: ruby
        run: |
          gem build znyx-sdk.gemspec
          mkdir -p ~/.gem && printf -- "---\n:rubygems_api_key: %s\n" "${{ secrets.RUBYGEMS_API_KEY }}" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
          gem push znyx-sdk-*.gem

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - working-directory: java
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: mvn --batch-mode deploy
