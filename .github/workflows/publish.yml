# Publish the Znyx SDKs to their registries.
#
# TEMPLATE - each job requires setup before it will run. The first release of
# each language is intended to be done manually (to verify install); after that,
# publishing a GitHub Release triggers the matching job(s).
#
# HARDENING NOTES
#   * All jobs run under the `release` GitHub Environment. Create it in
#     Settings → Environments and add required reviewers so a human approves
#     every publish, and scope the registry secrets to that environment.
#   * Python uses PyPI Trusted Publishing (OIDC) — no long-lived token. Configure
#     the trusted publisher for `znyx-sdk` on PyPI (workflow: publish.yml,
#     environment: release) before the first automated run.
#   * npm publishes with --provenance (OIDC id-token) for a signed supply-chain
#     attestation, in addition to the NPM_TOKEN.
#
# Remaining token-based secrets:
#   NPM_TOKEN             TypeScript -> npm (@znyx/sdk) and npm-runtime (@znyx/runtime)
#   CARGO_REGISTRY_TOKEN  Rust -> crates.io (znyx-sdk)
#   NUGET_API_KEY         C# -> NuGet (Znyx.Sdk)
#   RUBYGEMS_API_KEY      Ruby -> RubyGems (znyx-sdk)
#   OSSRH_USERNAME / OSSRH_TOKEN   Java -> Maven Central (ai.znyx:znyx-sdk)
#   MAVEN_GPG_PRIVATE_KEY / MAVEN_GPG_PASSPHRASE   Java -> artifact signing
#
# NOTE: Maven Central requires GPG-signed artifacts and a distributionManagement
# / staging plugin in java/pom.xml. `mvn deploy` as written will not succeed
# until that signing config is added.
#
# Distribution names are FROZEN across the move to zitrino-oss; do not rename them.
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish (manual runs only; a Release publishes all)"
        type: choice
        default: all
        options:
          - all
          - python
          - typescript
          - npm-runtime
          - rust
          - csharp
          - ruby
          - java

permissions:
  contents: read

jobs:
  python:
    if: ${{ github.event_name == 'release' || contains(fromJSON('["all","python"]'), github.event.inputs.package) }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade build twine
      - run: python -m build python
      - run: twine check python/dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  typescript:
    if: ${{ github.event_name == 'release' || contains(fromJSON('["all","typescript"]'), github.event.inputs.package) }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - working-directory: typescript
        run: npm ci && npm run build
      - working-directory: typescript
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: npm publish --provenance --access public

  npm-runtime:
    if: ${{ github.event_name == 'release' || contains(fromJSON('["all","npm-runtime"]'), github.event.inputs.package) }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - working-directory: npm-runtime
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: npm publish --provenance --access public

  rust:
    if: ${{ github.event_name == 'release' || contains(fromJSON('["all","rust"]'), github.event.inputs.package) }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  csharp:
    if: ${{ github.event_name == 'release' || contains(fromJSON('["all","csharp"]'), github.event.inputs.package) }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - working-directory: csharp
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet pack -c Release -o out
          dotnet nuget push "out/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json

  ruby:
    if: ${{ github.event_name == 'release' || contains(fromJSON('["all","ruby"]'), github.event.inputs.package) }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.2" }
      - working-directory: ruby
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          gem build znyx-sdk.gemspec
          mkdir -p ~/.gem && printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
          gem push znyx-sdk-*.gem

  java:
    if: ${{ github.event_name == 'release' || contains(fromJSON('["all","java"]'), github.event.inputs.package) }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with: { distribution: "temurin", java-version: "17" }
      - working-directory: java
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: mvn --batch-mode deploy
