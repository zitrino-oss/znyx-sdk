name: CI

# Build/compile each language SDK. Runs on every PR and on pushes to main,
# providing status checks that branch protection can require before merge.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build & import
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install .
          python -c "import znyx_sdk; print('znyx_sdk OK')"

  typescript:
    name: TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - name: Build
        working-directory: typescript
        run: |
          npm ci
          npm run build

  go:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build & vet
        working-directory: go
        run: |
          go mod download
          go build ./...
          go vet ./...

  java:
    name: Java build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - name: Compile
        working-directory: java
        run: mvn -B -ntp compile

  csharp:
    name: C# build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"
      - name: Build
        working-directory: csharp
        run: dotnet build -c Release

  ruby:
    name: Ruby build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check & gem build
        working-directory: ruby
        run: |
          ruby --version
          find lib -name '*.rb' -print0 | xargs -0 -n1 ruby -c
          gem build znyx-sdk.gemspec

  rust:
    name: Rust build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        working-directory: rust
        run: |
          cargo --version
          cargo build --verbose
